<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>ToDoddle</title>
  <link rel="stylesheet" href="styles/main.css" />
  <link rel="stylesheet" href="styles/typography.css" />
  <link rel="stylesheet" href="styles/components.css" />
  <link rel="stylesheet" href="styles/animations.css" />
</head>
<body>

  <!-- Custom title bar -->
  <div class="titlebar">
    <span class="titlebar-title">TODODDLE</span>
    <div class="titlebar-controls">
      <button class="btn-minimize" id="btn-minimize" title="Minimize">&#x2013;</button>
      <button class="btn-close"    id="btn-close"    title="Close">&#x2715;</button>
    </div>
  </div>

  <!-- Main card -->
  <div class="app-card">

    <!-- Date header (always visible) -->
    <div class="date-header">
      <div class="date-display">
        <span class="date-day" id="date-day">--</span>
      </div>
      <div class="date-meta">
        <span class="date-weekday-month" id="date-weekday-month">--- -----</span>
        <span class="clock" id="clock">--:-- --</span>
      </div>
    </div>

    <!-- Tab navigation -->
    <nav class="tab-nav">
      <button class="tab-btn active" data-tab="today">TODAY</button>
      <button class="tab-btn"        data-tab="history">HISTORY</button>
      <button class="tab-btn"        data-tab="summary">WEEKLY</button>
    </nav>

    <!-- ── TODAY VIEW ── -->
    <div class="view" id="view-today">

      <div class="progress-section">

        <!-- Avatar rider — slides along the progress bar -->
        <div class="avatar-rider" id="avatar-rider" data-state="none" style="opacity:0">
          <svg width="50" height="54" viewBox="0 0 50 54" fill="none" xmlns="http://www.w3.org/2000/svg">

            <!-- ── SHELL — cursed purple ── -->
            <circle cx="35" cy="18" r="13" fill="#6d28d9"/>
            <circle cx="35" cy="18" r="10" fill="none" stroke="#4c1d95" stroke-width="1.3" opacity="0.8"/>
            <circle cx="35" cy="18" r="6.5" fill="none" stroke="#4c1d95" stroke-width="1.1" opacity="0.8"/>
            <circle cx="35" cy="18" r="3"   fill="none" stroke="#4c1d95" stroke-width="1"   opacity="0.8"/>
            <circle cx="35" cy="18" r="1"   fill="#4c1d95" opacity="0.9"/>
            <ellipse cx="29" cy="11" rx="4" ry="2" fill="white" opacity="0.22" transform="rotate(-20,29,11)"/>
            <!-- shell glow -->
            <circle cx="35" cy="18" r="13" fill="none" stroke="#a855f7" stroke-width="0.8" opacity="0.4"/>

            <!-- ── BODY + HEAD — lavender ── -->
            <ellipse cx="18" cy="48" rx="14" ry="4.5" fill="#7c3aed" opacity="0.6"/>
            <ellipse cx="18" cy="40" rx="13" ry="9"   fill="#9c6dfa"/>
            <!-- head -->
            <circle  cx="13" cy="28" r="14"            fill="#c4b5fd"/>
            <ellipse cx="9"  cy="23" rx="5"  ry="3.5"  fill="white" opacity="0.18"/>

            <!-- ── EYE STALKS — purple ── -->
            <line x1="10" y1="16" x2="8"  y2="10" stroke="#8b5cf6" stroke-width="2.8" stroke-linecap="round"/>
            <line x1="16" y1="15" x2="20" y2="10" stroke="#8b5cf6" stroke-width="2.8" stroke-linecap="round"/>
            <circle cx="8"  cy="10" r="2.5" fill="#6d28d9"/>
            <circle cx="20" cy="10" r="2.5" fill="#6d28d9"/>

            <!-- ── NEUTRAL eyes + mouth ── -->
            <g class="face-neutral">
              <circle cx="8"  cy="17"   r="7"   fill="white"/>
              <circle cx="8"  cy="17.5" r="5"   fill="#7c3aed"/>
              <circle cx="8"  cy="18"   r="2.8" fill="#0d0a1a"/>
              <path d="M2 14.5 Q8 11.5 14 14.5" stroke="#0d0a1a" stroke-width="2" fill="none" stroke-linecap="round"/>
              <circle cx="10.5" cy="14.5" r="1.8" fill="white"/>
              <circle cx="7"    cy="17.5" r="0.8" fill="white"/>
              <circle cx="20"  cy="16"   r="7"   fill="white"/>
              <circle cx="20"  cy="16.5" r="5"   fill="#7c3aed"/>
              <circle cx="20"  cy="17"   r="2.8" fill="#0d0a1a"/>
              <path d="M14 13.5 Q20 10.5 26 13.5" stroke="#0d0a1a" stroke-width="2" fill="none" stroke-linecap="round"/>
              <circle cx="22.5" cy="13.5" r="1.8" fill="white"/>
              <circle cx="19"   cy="16.5" r="0.8" fill="white"/>
              <path d="M8 34 Q13 37.5 18 34" stroke="#c026d3" stroke-width="1.6" fill="none" stroke-linecap="round"/>
            </g>

            <!-- ── SAD eyes + mouth ── -->
            <g class="face-sad" style="display:none">
              <path d="M3  13 Q8  15  12 12"  stroke="#0d0a1a" stroke-width="1.7" fill="none" stroke-linecap="round"/>
              <path d="M15 12 Q20 14  24 11"  stroke="#0d0a1a" stroke-width="1.7" fill="none" stroke-linecap="round"/>
              <circle cx="8"  cy="17"   r="7"   fill="white"/>
              <circle cx="8"  cy="17.5" r="5"   fill="#7c3aed"/>
              <circle cx="8"  cy="18"   r="2.8" fill="#0d0a1a"/>
              <path d="M2 15.5 Q8 13.5 14 15.5" stroke="#0d0a1a" stroke-width="3.2" fill="#0d0a1a"/>
              <circle cx="10" cy="14.8" r="1.4" fill="white"/>
              <ellipse cx="8" cy="23"   rx="2.8" ry="1.1" fill="#d8b4fe" opacity="0.7"/>
              <circle cx="20" cy="16"   r="7"   fill="white"/>
              <circle cx="20" cy="16.5" r="5"   fill="#7c3aed"/>
              <circle cx="20" cy="17"   r="2.8" fill="#0d0a1a"/>
              <path d="M14 14.5 Q20 12.5 26 14.5" stroke="#0d0a1a" stroke-width="3.2" fill="#0d0a1a"/>
              <circle cx="22" cy="13.8" r="1.4" fill="white"/>
              <ellipse cx="20" cy="22"  rx="2.8" ry="1.1" fill="#d8b4fe" opacity="0.7"/>
              <!-- tears — purple-pink -->
              <ellipse cx="8"  cy="30" rx="1.6" ry="3" fill="#d8b4fe" opacity="0.9"/>
              <ellipse cx="20" cy="29" rx="1.6" ry="3" fill="#d8b4fe" opacity="0.9"/>
              <path d="M8 35 Q13 32 18 35" stroke="#c026d3" stroke-width="1.6" fill="none" stroke-linecap="round"/>
            </g>

            <!-- ── HAPPY eyes — ^^ crescent squint ── -->
            <g class="face-happy" style="display:none">
              <circle cx="8"  cy="17" r="7" fill="white"/>
              <path d="M1.5 19  Q8  11  14.5 19"  fill="#0d0a1a"/>
              <path d="M1.5 19  Q8  14.5 14.5 19" fill="#c4b5fd"/>
              <circle cx="20" cy="16" r="7" fill="white"/>
              <path d="M13.5 18  Q20 10  26.5 18"  fill="#0d0a1a"/>
              <path d="M13.5 18  Q20 13.5 26.5 18" fill="#c4b5fd"/>
              <!-- sparkle stars — gold/pink -->
              <text x="0"  y="12" font-size="6" fill="#e040fb" font-family="sans-serif">★</text>
              <text x="26" y="11" font-size="6" fill="#e040fb" font-family="sans-serif">★</text>
              <!-- rosy cheeks -->
              <circle cx="5"  cy="33" r="3.5" fill="#e879f9" opacity="0.38"/>
              <circle cx="20" cy="33" r="3.5" fill="#e879f9" opacity="0.38"/>
              <path d="M7 33 Q13 41 19 33" stroke="#c026d3" stroke-width="1.8" fill="none" stroke-linecap="round"/>
              <path d="M7 33 Q13 41 19 33 Q13 36 7 33" fill="white" opacity="0.45"/>
            </g>

            <!-- ── TAIL normal ── -->
            <g class="arms-normal">
              <path d="M29 42 Q36 46 32 50 Q27 54 21 52" stroke="#8b5cf6" stroke-width="3.5" fill="none" stroke-linecap="round"/>
            </g>
            <!-- ── TAIL wiggle (dance) ── -->
            <g class="arms-up" style="display:none">
              <path d="M29 40 Q37 44 33 49 Q28 53 22 51 Q17 48 19 43" stroke="#e040fb" stroke-width="3.5" fill="none" stroke-linecap="round"/>
            </g>

          </svg>
          <div class="avatar-sparkles" aria-hidden="true">✨✨</div>
        </div>

        <div class="progress-bar-track">
          <div class="progress-bar-fill" id="progress-bar"></div>
        </div>
        <span class="progress-label" id="progress-label">0 / 0 done</span>
      </div>

      <div class="add-task-section">
        <div class="input-row">
          <input
            type="text"
            id="task-input"
            class="task-input"
            placeholder="what's the doodle?"
            maxlength="80"
            autocomplete="off"
            spellcheck="false"
          />
          <button class="btn-add" id="btn-add">+</button>
        </div>
        <div class="category-row" id="category-row">
          <!-- Category pills rendered by JS -->
        </div>
      </div>

      <!-- Carry-over banner -->
      <div class="carryover-banner hidden" id="carryover-banner">
        <span class="carryover-icon">📋</span>
        <span class="carryover-msg" id="carryover-msg"></span>
        <div class="carryover-btns">
          <button class="carryover-btn yes" id="carryover-yes">ADD</button>
          <button class="carryover-btn no"  id="carryover-no">SKIP</button>
        </div>
      </div>

      <div class="task-list-wrapper">
        <ul class="task-list" id="task-list"></ul>
        <div class="empty-state" id="empty-state">
          <p>no doodles yet!</p>
          <p>add one above ↑</p>
        </div>
      </div>

    </div>

    <!-- ── HISTORY VIEW ── -->
    <div class="view hidden" id="view-history">

      <div class="calendar-section">
        <div class="cal-nav">
          <button class="cal-arrow" id="cal-prev">&#9664;</button>
          <span class="cal-month-label" id="cal-month-label">--- ----</span>
          <button class="cal-arrow" id="cal-next">&#9654;</button>
        </div>
        <div class="cal-legend">
          <span class="cal-legend-label">LESS</span>
          <span class="cal-legend-swatch" data-heat="0"></span>
          <span class="cal-legend-swatch" data-heat="1"></span>
          <span class="cal-legend-swatch" data-heat="2"></span>
          <span class="cal-legend-swatch" data-heat="3"></span>
          <span class="cal-legend-swatch" data-heat="4"></span>
          <span class="cal-legend-label">MORE</span>
        </div>
        <div class="cal-weekdays">
          <span>MO</span><span>TU</span><span>WE</span>
          <span>TH</span><span>FR</span><span>SA</span><span>SU</span>
        </div>
        <div class="cal-grid" id="cal-grid"></div>
      </div>

      <!-- Day detail panel — shown when a date is clicked -->
      <div class="hist-detail hidden" id="hist-detail">
        <div class="hist-detail-header">
          <span class="hist-detail-date"    id="hist-detail-date">–</span>
          <span class="hist-detail-summary" id="hist-detail-summary"></span>
        </div>
        <ul class="hist-detail-list" id="hist-detail-list"></ul>
        <div class="hist-detail-empty hidden" id="hist-detail-empty">no tasks that day</div>
      </div>

    </div>

    <!-- ── SUMMARY VIEW ── -->
    <div class="view hidden" id="view-summary">

      <div class="summary-scroll">

        <!-- Week navigation -->
        <div class="week-nav-row">
          <button class="week-arrow" id="week-prev">&#9664;</button>
          <span class="week-header" id="week-header">THIS WEEK</span>
          <button class="week-arrow" id="week-next">&#9654;</button>
        </div>

        <!-- 7-day strip -->
        <div class="week-days-strip" id="week-days-strip"></div>

        <!-- Category breakdown -->
        <div class="summary-section-title">BY CATEGORY</div>
        <div class="category-bars" id="category-bars"></div>

        <!-- Week stats row -->
        <div class="stats-row" id="stats-row"></div>

        <!-- ── Monthly Report ── -->
        <div class="summary-section-title monthly-title">
          <span id="monthly-title-label">MONTHLY REPORT</span>
        </div>

        <!-- Monthly KPI grid -->
        <div class="monthly-kpi-grid" id="monthly-kpi-grid"></div>

        <!-- Weekly breakdown bars for the month -->
        <div class="summary-section-title" style="font-size:5px;letter-spacing:1px">WEEKLY BREAKDOWN</div>
        <div class="monthly-week-bars" id="monthly-week-bars"></div>

        <!-- Category split for month -->
        <div class="summary-section-title" style="font-size:5px;letter-spacing:1px">MONTHLY BY CATEGORY</div>
        <div class="category-bars" id="monthly-cat-bars"></div>

      </div>
    </div>

  </div>

  <script src="renderer.js"></script>
</body>
</html>
